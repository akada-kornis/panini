<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panini Maé & Robin manquants</title>
  <style>
    :root{
      --green:#11a85b;
      --green2:#1fd06d;
      --blue:#24358f;
      --blue2:#17215d;
      --red:#e51d2a;
      --gold:#f7c948;
      --cream:#fff7e8;
      --ink:#171821;
      --muted:#6b7280;
      --card:#ffffff;
      --line:rgba(255,255,255,.18);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 10% 10%, rgba(31,208,109,.35), transparent 26%),
        radial-gradient(circle at 90% 0%, rgba(229,29,42,.35), transparent 28%),
        radial-gradient(circle at 50% 110%, rgba(247,201,72,.28), transparent 30%),
        linear-gradient(135deg, #111943 0%, #1e2f8a 46%, #0d6b43 100%);
      padding:28px;
    }
    .wrap{max-width:1120px;margin:0 auto}
    header{
      position:relative;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:30px;
      padding:32px;
      color:white;
      background:
        linear-gradient(120deg, rgba(255,255,255,.13), rgba(255,255,255,.04)),
        linear-gradient(135deg, rgba(229,29,42,.95), rgba(36,53,143,.9) 48%, rgba(17,168,91,.94));
      box-shadow:0 24px 80px rgba(0,0,0,.35);
    }
    header:before{
      content:"";
      position:absolute; inset:-80px -60px auto auto;
      width:260px; height:260px;
      border-radius:50%;
      border:28px solid rgba(255,255,255,.14);
    }
    header:after{
      content:"⚽";
      position:absolute; right:34px; bottom:20px;
      font-size:72px;
      filter:drop-shadow(0 10px 20px rgba(0,0,0,.25));
      opacity:.92;
    }
    .kicker{font-weight:900;letter-spacing:.18em;text-transform:uppercase;font-size:13px;opacity:.9}
    h1{font-size:clamp(38px,7vw,78px);line-height:.88;margin:12px 0 12px;font-weight:1000;letter-spacing:-.06em;text-transform:uppercase}
    .subtitle{font-size:18px;max-width:680px;opacity:.95;margin:0}
    .stats{display:flex;gap:14px;flex-wrap:wrap;margin-top:26px}
    .stat{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.24);backdrop-filter:blur(10px);border-radius:18px;padding:14px 18px;min-width:150px}
    .stat b{display:block;font-size:30px;line-height:1}.stat span{font-size:12px;text-transform:uppercase;letter-spacing:.08em;opacity:.85}
    .toolbar{display:flex;gap:12px;align-items:center;margin:22px 0;flex-wrap:wrap}
    .search{flex:1;min-width:240px;border:0;border-radius:16px;padding:16px 18px;font-size:16px;box-shadow:0 12px 36px rgba(0,0,0,.22)}
    .pill{border:1px solid rgba(255,255,255,.25);color:white;background:rgba(255,255,255,.12);border-radius:999px;padding:11px 14px;font-weight:800;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
    .card{background:var(--card);border-radius:22px;padding:18px;box-shadow:0 16px 45px rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.65);position:relative;overflow:hidden}
    .card:before{content:"";position:absolute;inset:0 0 auto 0;height:7px;background:linear-gradient(90deg,var(--red),var(--gold),var(--green),var(--blue));}
    .country{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-top:5px;margin-bottom:14px}
    .country h2{font-size:18px;margin:0;letter-spacing:-.02em}.count{font-size:12px;font-weight:900;color:white;background:var(--blue);border-radius:999px;padding:5px 9px;white-space:nowrap}
    .stickers{display:flex;gap:8px;flex-wrap:wrap}
    .num{display:inline-flex;align-items:center;justify-content:center;min-width:42px;height:42px;padding:0 10px;border-radius:14px;background:#f1f3f8;border:1px solid #e5e7eb;font-weight:1000;font-size:17px;cursor:pointer;user-select:none;transition:.15s ease}
    .num:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.13)}
    .num.done{background:#d1fae5;color:#065f46;text-decoration:line-through;opacity:.72}.dibu{background:linear-gradient(135deg,#fff1a8,#f7c948);border-color:#eab308;color:#4a2b00;box-shadow:0 8px 20px rgba(247,201,72,.35)}
    .dibu:after{content:" DIBU !!!";font-size:11px;margin-left:4px;font-weight:1000}
    .footer{margin:22px 0 0;text-align:center;color:rgba(255,255,255,.82);font-size:13px}
    @media(max-width:620px){body{padding:14px}header{padding:24px;border-radius:24px}header:after{font-size:48px;right:22px;bottom:18px}.grid{grid-template-columns:1fr}h1{font-size:45px}.stat{flex:1}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="kicker">Akada collection tracker</div>
      <h1>Panini<br>Manquants</h1>
      <p class="subtitle">Liste privée des vignettes à trouver - ambiance Mundial, efficacité jurassienne, et DIBU en mode légende.</p>
      <div class="stats">
        <div class="stat"><b id="total">0</b><span>vignettes</span></div>
        <div class="stat"><b id="countries">0</b><span>pays / séries</span></div>
        <div class="stat"><b id="remaining">0</b><span>encore à trouver</span></div>
      </div>
    </header>

    <div class="toolbar">
      <input id="search" class="search" placeholder="Rechercher un pays, DIBU, FWC..." />
      <button class="pill" onclick="resetDone()">Tout remettre</button>
    </div>

    <main id="grid" class="grid"></main>
    <div class="footer">Clique sur une vignette quand tu l'as trouvée. La page garde tes coches sur ce navigateur.</div>
  </div>

<script>
const data = [
  ['Afrique du Sud', ['4','10']],
  ['Tchéquie', ['1']],
  ['Canada', ['1','6']],
  ['Bosnie-Herzégovine', ['13','18']],
  ['Qatar', ['12']],
  ['Suisse', ['3','10']],
  ['Brésil', ['7','11']],
  ['Écosse', ['20']],
  ['USA', ['8']],
  ['Paraguay', ['7','9']],
  ['Turquie', ['17']],
  ["Côte d'Ivoire", ['8']],
  ['Équateur', ['6','8']],
  ['Japon', ['12']],
  ['Égypte', ['6','20']],
  ['Iran', ['8']],
  ['Nouvelle-Zélande', ['14']],
  ['Cap-Vert', ['8','15','18']],
  ['Arabie saoudite', ['1','2','12']],
  ['Uruguay', ['6']],
  ['Irak', ['8','13','17']],
  ['Norvège', ['4']],
  ['Argentine', ['2 DIBU !!!']],
  ['Algérie', ['9','18']],
  ['Autriche', ['12']],
  ['Jordanie', ['1','12','15','19']],
  ['Portugal', ['4','7','13','19']],
  ['Congo', ['10','14']],
  ['Ouzbékistan', ['1','8','16']],
  ['Croatie', ['3','18']],
  ['Ghana', ['2','13','18']],
  ['Panama', ['10']],
  ['FWC', ['11']]
];
const KEY='akada-panini-done-v1';
let done = JSON.parse(localStorage.getItem(KEY) || '{}');
const total = data.reduce((s, [, nums]) => s + nums.length, 0);
function id(country, n){ return `${country}__${n}`; }
function save(){ localStorage.setItem(KEY, JSON.stringify(done)); }
function render(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const grid = document.getElementById('grid');
  grid.innerHTML='';
  let visible = 0;
  data.forEach(([country, nums])=>{
    const hay = (country+' '+nums.join(' ')).toLowerCase();
    if(q && !hay.includes(q)) return;
    visible++;
    const card = document.createElement('section');
    card.className='card';
    const head = document.createElement('div');
    head.className='country';
    head.innerHTML = `<h2>${country}</h2><span class="count">${nums.length}</span>`;
    const stickers = document.createElement('div');
    stickers.className='stickers';
    nums.forEach(n=>{
      const span = document.createElement('span');
      const isDibu = String(n).toLowerCase().includes('dibu');
      span.className = 'num' + (isDibu ? ' dibu' : '') + (done[id(country,n)] ? ' done' : '');
      span.textContent = String(n).replace(' DIBU !!!','');
      span.title = isDibu ? 'DIBU !!!' : `${country} ${n}`;
      span.onclick=()=>{ done[id(country,n)] = !done[id(country,n)]; save(); render(); };
      stickers.appendChild(span);
    });
    card.appendChild(head); card.appendChild(stickers); grid.appendChild(card);
  });
  const found = Object.values(done).filter(Boolean).length;
  document.getElementById('total').textContent = total;
  document.getElementById('countries').textContent = data.length;
  document.getElementById('remaining').textContent = total - found;
}
function resetDone(){ done={}; save(); render(); }
document.getElementById('search').addEventListener('input', render);
render();
</script>
</body>
</html>
